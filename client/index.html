  </head>
  <body>
    <!-- React root -->
    <div id="root"></div>
    
    <!-- Simple loading indicator while React loads -->
    <div id="app-loader" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999;">
      <div style="text-align:center;">
        <div style="width:48px;height:48px;border:4px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div>
        <p style="color:#6b7280;font-family:system-ui,sans-serif;">Loading TruckNav Pro...</p>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    
    <script>
      // Hide loader quickly - React should mount fast
      (function() {
        var loader = document.getElementById('app-loader');
        // Hide after 2 seconds regardless - React should have loaded by then
        setTimeout(function() {
          if (loader) loader.style.display = 'none';
        }, 2000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
